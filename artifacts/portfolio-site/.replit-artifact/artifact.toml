kind = "web"
previewPath = "/"
title = "Portfolio Site"
version = "1.0.0"
id = "artifacts/portfolio-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24826

[services.development]
run = "pnpm --filter @workspace/portfolio-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/portfolio-site", "run", "build" ]
publicDir = "artifacts/portfolio-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24826"
BASE_PATH = "/"
